<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Rivin Weeraka</title>
    <link rel="icon" type="image/webp" href="assets/rivin-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="subpage">
    <canvas class="dot-grid" id="dot-grid"></canvas>

    <header class="header">
        <a href="index.html" class="logo">
            <img src="assets/rivin-logo.webp" alt="Rivin Logo" class="site-logo">
        </a>
        <nav class="nav">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>

        </nav>
    </header>

    <main class="main-content">
        <div class="contact-wrapper">
            <h1 class="page-header">GET IN TOUCH</h1>
            
            <form action="#" class="form-group">
                <div class="form-group">
                    <input type="text" class="form-input" placeholder="YOUR NAME" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-input" placeholder="EMAIL ADDRESS" required>
                </div>
                <div class="form-group">
                    <textarea class="form-input" placeholder="MESSAGE" required></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="event.preventDefault();">SEND MESSAGE</button>
            </form>
            
            <div class="contact-details">
                <div>
                    <h3 class="text-meta">DIRECT INQUIRIES</h3>
                    <p class="text-body" style="font-size: 18px;">
                        <a href="mailto:weerakarivin@gmail.com" style="color: #fff; text-decoration: none;">weerakarivin@gmail.com</a><br>
                        <a href="tel:+94702479612" style="color: #fff; text-decoration: none;">(+94) 70 247 9612</a>
                    </p>
                </div>
                <div>
                    <h3 class="text-meta">REFERENCES</h3>
                    <p class="text-body" style="font-size: 18px;">
                        Shakthi Attanayake - NEXT Tech<br>
                        Sithara Indumini - Embla Software
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.querySelectorAll('.nav a').forEach(link => {
            const text = link.textContent.trim();
            link.textContent = ''; 
            link.classList.add('roll-link');
            
            text.split('').forEach((char, i) => {
                const wrap = document.createElement('span');
                wrap.className = 'char-wrap';
                wrap.style.transitionDelay = `${i * 0.04}s`; 
                const front = document.createElement('span');
                front.className = 'char-front';
                front.textContent = char === ' ' ? '\u00A0' : char;

                const back = document.createElement('span');
                back.className = 'char-back';
                back.textContent = char === ' ' ? '\u00A0' : char;

                wrap.appendChild(front);
                wrap.appendChild(back);
                link.appendChild(wrap);
            });
        });

        // Matrix Dot Grid
        (function() {
            const canvas = document.getElementById('dot-grid');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const spacing = 12; 
            const dotRadius = 1.2;
            const revealRadius = 440; 
            const decayRate = 0.015; 
            let mouseX = -9999, mouseY = -9999;
            let cols, rows, brightness; 

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                cols = Math.ceil(canvas.width / spacing) + 1;
                rows = Math.ceil(canvas.height / spacing) + 1;
                brightness = new Float32Array(cols * rows); 
            }
            resize();
            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        const x = c * spacing;
                        const y = r * spacing;
                        const dx = x - mouseX;
                        const dy = y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < revealRadius) {
                            const intensity = 1 - (dist / revealRadius);
                            brightness[idx] = Math.max(brightness[idx], intensity);
                        }

                        if (brightness[idx] > 0.01) {
                            const alpha = brightness[idx];
                            ctx.beginPath();
                            ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                            ctx.shadowColor = `rgba(255, 255, 255, ${alpha * 0.8})`;
                            ctx.shadowBlur = alpha * 8;
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            brightness[idx] -= decayRate;
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
