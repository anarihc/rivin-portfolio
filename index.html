<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivin Weeraka Portfolio</title>
    <link rel="icon" type="image/webp" href="assets/rivin-logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <img src="assets/rivin-logo.webp" alt="Loading...">
    </div>

    <header class="header">
        <a href="#" class="logo">
            <img src="assets/rivin-logo.webp" alt="Rivin Logo" class="site-logo">
        </a>
        <nav class="nav">
            <a href="about.html">ABOUT</a>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <main class="hero">
        <canvas class="dot-grid" id="dot-grid"></canvas>
        <div class="marquee-wrapper">
            <div class="marquee line1"><span class="marquee-text">RIVIN WEERAKA RIVIN WEERAKA </span><span class="marquee-text">RIVIN WEERAKA RIVIN WEERAKA </span></div>
            <div class="marquee line2"><span class="marquee-text">RIVIN WEERAKA RIVIN WEERAKA </span><span class="marquee-text">RIVIN WEERAKA RIVIN WEERAKA </span></div>
        </div>
        
        <div class="hero-image-container">
            <canvas id="hero-canvas" class="hero-image"></canvas>
        </div>
    </main>
    <script>
        const app = new PIXI.Application({
            view: document.getElementById('hero-canvas'),
            backgroundAlpha: 0,
            width: 800,
            height: 800
        });

        const minLoadTime = new Promise(resolve => setTimeout(resolve, 1500));

            // Ensure marquee is shown and stable after font is ready (independent of photo loading)
            const revealMarquee = () => {
                const wrapper = document.querySelector('.marquee-wrapper');
                if (wrapper) {
                    wrapper.style.opacity = '1';
                    
                    // Force Layout Calculation
                    void wrapper.offsetWidth;
                    wrapper.classList.add('loaded');
                    
                    // Start animations only after fonts/layout are stable
                    document.querySelectorAll('.marquee').forEach(el => {
                        el.classList.add('running');
                    });

                    // Heartbeat Repaint sequence to force Safari to wake up the layer
                    let count = 0;
                    const heartbeat = setInterval(() => {
                        wrapper.style.perspective = (count % 2 === 0) ? '1000.1px' : '1000px';
                        count++;
                        if (count > 20) clearInterval(heartbeat);
                    }, 50);
                }
            };

            if (document.fonts) {
                document.fonts.ready.then(revealMarquee);
                // Failsafe: reveal anyway after 3 seconds if font ready doesn't fire
                setTimeout(revealMarquee, 3000);
            } else {
                revealMarquee();
            }

            // PIXI Asset Loading
            Promise.all([
                PIXI.Assets.load(['assets/masked-photo.webp', 'assets/depth-map.webp']),
                minLoadTime
            ]).then(([assets]) => {
                // Hide loading screen once main assets are loaded and min time has passed
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.classList.add('hidden');
                }

                const imageTex = assets['assets/masked-photo.webp'];
                const depthTex = assets['assets/depth-map.webp'];
                
                app.renderer.resize(imageTex.width, imageTex.height);

                const image = new PIXI.Sprite(imageTex);
                const depthMap = new PIXI.Sprite(depthTex);

                image.width = app.screen.width;
                image.height = app.screen.height;
                depthMap.width = app.screen.width;
                depthMap.height = app.screen.height;

                const displacementFilter = new PIXI.DisplacementFilter(depthMap);
                displacementFilter.scale.set(0); 
                image.filters = [displacementFilter];

                app.stage.addChild(image);
                app.stage.addChild(depthMap);

                let targetX = 0;
                let currentX = 0;

                window.addEventListener('mousemove', (e) => {
                    const centerX = window.innerWidth / 2;
                    targetX = -((e.clientX - centerX) / centerX) * 8; 
                });

                app.ticker.add(() => {
                    currentX += (targetX - currentX) * 0.025;
                    displacementFilter.scale.x = currentX;
                    displacementFilter.scale.y = 0;
                    app.stage.x = currentX * 0.5;
                });
                

            });

        // 3D Text Roll Feature (GSAP SplitText Alternative)
        document.querySelectorAll('.nav a').forEach(link => {
            const text = link.textContent.trim();
            link.textContent = ''; // clear original
            link.classList.add('roll-link');
            
            text.split('').forEach((char, i) => {
                const wrap = document.createElement('span');
                wrap.className = 'char-wrap';
                wrap.style.transitionDelay = `${i * 0.04}s`; // Stagger duration

                const front = document.createElement('span');
                front.className = 'char-front';
                front.textContent = char === ' ' ? '\u00A0' : char;

                const back = document.createElement('span');
                back.className = 'char-back';
                back.textContent = char === ' ' ? '\u00A0' : char;

                wrap.appendChild(front);
                wrap.appendChild(back);
                link.appendChild(wrap);
            });
        });

        // === Matrix Dot Grid with Glowing Trail ===
        (function() {
            const canvas = document.getElementById('dot-grid');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const spacing = 12; // closer dots
            const dotRadius = 1.2;
            const revealRadius = 440; // how close mouse must be to light a dot
            const decayRate = 0.015; // how fast dots fade (lower = longer trail)
            let mouseX = -9999, mouseY = -9999;
            let cols, rows, brightness; // brightness array stores each dot's current glow (0-1)

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                cols = Math.ceil(canvas.width / spacing) + 1;
                rows = Math.ceil(canvas.height / spacing) + 1;
                brightness = new Float32Array(cols * rows); // all start at 0 (invisible)
            }
            resize();
            window.addEventListener('resize', resize);

            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        const x = c * spacing;
                        const y = r * spacing;
                        const dx = x - mouseX;
                        const dy = y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        // Boost brightness if near mouse
                        if (dist < revealRadius) {
                            const intensity = 1 - (dist / revealRadius);
                            brightness[idx] = Math.max(brightness[idx], intensity);
                        }

                        // Draw dot if it has any brightness
                        if (brightness[idx] > 0.01) {
                            const alpha = brightness[idx];
                            ctx.beginPath();
                            ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                            // Glow: brighter dots get a subtle shadow
                            ctx.shadowColor = `rgba(255, 255, 255, ${alpha * 0.8})`;
                            ctx.shadowBlur = alpha * 8;
                            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.fill();
                            ctx.shadowBlur = 0;

                            // Decay brightness for trail fade
                            brightness[idx] -= decayRate;
                        }
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
</html>
